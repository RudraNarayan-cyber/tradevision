server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=0

            - id: market-data-service
              uri: lb://market-data-service
              predicates:
                - Path=/api/market/**
              filters:
                - StripPrefix=0

            - id: paper-trading-service
              uri: lb://paper-trading-service
              predicates:
                - Path=/api/trading/**
              filters:
                - StripPrefix=0

            - id: portfolio-service
              uri: lb://portfolio-service
              predicates:
                - Path=/api/portfolio/**
              filters:
                - StripPrefix=0

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=0

            - id: news-service
              uri: lb://news-service
              predicates:
                - Path=/api/news/**
              filters:
                - StripPrefix=0

            - id: watchlist-service
              uri: lb://watchlist-service
              predicates:
                - Path=/api/watchlist/**
              filters:
                - StripPrefix=0

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=0

            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**
              filters:
                - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"