# infrastructure/docker-compose.yml

services:

  # PostgreSQL - User, Portfolio, Payment data
  postgres:
    image: postgres:15
    container_name: tradevision-postgres
    environment:
      POSTGRES_USER: tradevision
      POSTGRES_PASSWORD: tradevision123
      POSTGRES_DB: tradevision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tradevision-network

  # MySQL - Trading Orders, Transaction data
  mysql:
    image: mysql:8
    container_name: tradevision-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tradevision_trading
      MYSQL_USER: tradevision
      MYSQL_PASSWORD: tradevision123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tradevision-network

  # MongoDB - Market data & News
  mongodb:
    image: mongo:6
    container_name: tradevision-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: tradevision
      MONGO_INITDB_ROOT_PASSWORD: tradevision123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - tradevision-network

  # Redis - Caching
  redis:
    image: redis:7-alpine
    container_name: tradevision-redis
    ports:
      - "6379:6379"
    networks:
      - tradevision-network

  # Zookeeper - Kafka dependency
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: tradevision-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tradevision-network

  # Kafka - Async messaging
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: tradevision-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - tradevision-network

  # Zipkin - Distributed tracing
  zipkin:
    image: openzipkin/zipkin
    container_name: tradevision-zipkin
    ports:
      - "9411:9411"
    networks:
      - tradevision-network

# Volumes
volumes:
  postgres_data:
  mongo_data:
  mysql_data:

# Network
networks:
  tradevision-network:
    driver: bridge